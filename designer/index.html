<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsaacLike — Content Designer</title>
  <link rel="stylesheet" href="./designer.css" />
</head>
<body>
  <header>
    <h1>ISAACLIKE · DESIGNER</h1>
    <div class="spacer"></div>
    <button id="loadBtn">Load content.json…</button>
    <button id="reloadBtn">Reload from server</button>
    <button id="saveBtn" class="primary">Save content.json</button>
    <a id="playLink" href="../game/index.html" target="_blank"><button class="go">▶ Play</button></a>
    <input id="fileInput" type="file" accept="application/json" class="hidden" />
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="characters">Characters &amp; Enemies</div>
    <div class="tab" data-tab="weapons">Weapons</div>
    <div class="tab" data-tab="items">Items</div>
  </div>

  <div id="errors" class="errors"></div>

  <main>
    <div class="list">
      <button id="addBtn" style="width:100%;margin-bottom:8px;">+ New</button>
      <div id="listItems"></div>
    </div>

    <div id="formWrap" class="form">
      <div class="empty">Select an item, or click “+ New”.</div>
    </div>

    <div class="sprite-editor">
      <h3>SPRITE · 16×16</h3>
      <canvas id="spriteGrid" width="256" height="256"></canvas>
      <div id="palette" class="palette"></div>
      <div class="sprite-tools">
        <label class="pickwrap">Color <input type="color" id="paintColor" value="#e8d8b0" /></label>
        <button id="eraserBtn" title="Erase to transparent">Eraser</button>
        <button id="clearSprite" class="danger">Clear</button>
      </div>
      <h3 style="margin-top:14px;">IN-GAME PREVIEW</h3>
      <canvas id="previewCanvas" width="260" height="150"></canvas>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script type="module" src="./designer.js"></script>
</body>
</html>

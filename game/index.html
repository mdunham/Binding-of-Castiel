<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsaacLike</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0d0a12;
      color: #e0d6ea;
      font-family: monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    h1 { margin: 12px 0 6px; font-size: 18px; letter-spacing: 2px; color: #b9a9cc; }
    #game {
      background: #15101a;
      border: 3px solid #2b2330;
      border-radius: 6px;
      image-rendering: pixelated;
      max-width: 96vw; max-height: 82vh;
    }
    .hint { margin-top: 8px; font-size: 12px; color: #6f6480; }
    .hint a { color: #9a86b8; }
  </style>
</head>
<body>
  <h1>I S A A C L I K E</h1>
  <canvas id="game" width="900" height="620"></canvas>
  <p class="hint">WASD move • Arrow keys shoot • R restart &nbsp;|&nbsp; content from
    <a href="../content.json">content.json</a> (edit it in the
    <a href="../designer/index.html">designer</a>)</p>
  <script type="module" src="./src/main.js"></script>
</body>
</html>

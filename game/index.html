<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>IsaacLike</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0d0a12;
      color: #e0d6ea;
      font-family: monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }
    h1 { margin: 12px 0 6px; font-size: 18px; letter-spacing: 2px; color: #b9a9cc; }
    #game {
      background: #15101a;
      border: 3px solid #2b2330;
      border-radius: 6px;
      image-rendering: pixelated;
      max-width: 96vw; max-height: 82vh;
      touch-action: none;           /* let the game handle touch, no scroll/zoom */
    }
    /* On phones, hide the title and let the canvas use the full viewport. */
    @media (pointer: coarse), (max-width: 700px) {
      h1 { display: none; }
      #game { max-width: 100vw; max-height: 100vh; }
    }
    /* Fullscreen: scale the canvas to fill the screen, preserving aspect. */
    #game:fullscreen {
      max-width: none; max-height: none;
      width: 100vw; height: 100vh;
      object-fit: contain;
      border: none; border-radius: 0;
      background: #0d0a12;
    }
    .bar { margin-top: 8px; display: flex; gap: 12px; align-items: center; }
    .hint { font-size: 12px; color: #6f6480; max-width: 92vw; text-align: center; line-height: 1.5; }
    .hint a { color: #9a86b8; }
    .ctrl {
      font-size: 12px; color: #c9bcd8; display: flex; align-items: center; gap: 6px;
      cursor: pointer; white-space: nowrap;
    }
    .ctrl input { accent-color: #9a86b8; cursor: pointer; }
    #gpStatus { font-size: 11px; color: #7ed957; min-width: 4em; }
    #fsBtn, #cheatBtn {
      background: #2b2330; color: #e0d6ea; border: 1px solid #3a3145;
      padding: 6px 12px; border-radius: 5px; cursor: pointer; font-family: monospace; font-size: 12px;
    }
    #fsBtn:hover, #cheatBtn:hover { border-color: #9a86b8; }
    #cheatPanel {
      display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 280px;
      background: rgba(18,13,24,0.96); border-left: 2px solid #3a3145;
      padding: 12px 14px; overflow-y: auto; z-index: 50;
      font-family: monospace; font-size: 12px; color: #e0d6ea;
    }
    #cheatPanel.open { display: block; }
    #cheatPanel h3 { margin: 14px 0 6px; font-size: 12px; color: #9a86b8; letter-spacing: 1px; }
    #cheatPanel h3:first-child { margin-top: 0; }
    #cheatPanel .grid { display: flex; flex-wrap: wrap; gap: 5px; }
    #cheatPanel button {
      background: #2b2330; color: #e0d6ea; border: 1px solid #3a3145;
      padding: 5px 8px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 11px;
    }
    #cheatPanel button:hover { border-color: #9a86b8; background: #352c41; }
    #cheatPanel .close { float: right; }
    #cheatPanel .note { color: #6f6480; margin: 4px 0 0; }
  </style>
</head>
<body>
  <h1>I S A A C L I K E</h1>
  <canvas id="game" width="900" height="620"></canvas>
  <div class="bar">
    <button id="fsBtn">⛶ Fullscreen</button>
    <button id="cheatBtn">🐞 Cheats</button>
    <label class="ctrl" title="Enable Xbox / standard USB gamepad (left stick move, right stick shoot, X bomb, A descend)">
      <input type="checkbox" id="gpToggle" /> Gamepad
    </label>
    <span id="gpStatus"></span>
    <p class="hint">Keyboard: WASD move · Arrows shoot · E bomb · M mute · R restart · SPACE descend<br>
      Touch: twin virtual sticks · bomb button · tap character to start<br>
      Gamepad: left stick move · right stick shoot · X bomb · A descend · B restart<br>
      <a href="../designer/index.html">designer</a></p>
  </div>
  <div id="cheatPanel"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>

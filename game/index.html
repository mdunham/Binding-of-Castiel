<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsaacLike</title>
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0d0a12;
      color: #e0d6ea;
      font-family: monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    h1 { margin: 12px 0 6px; font-size: 18px; letter-spacing: 2px; color: #b9a9cc; }
    #game {
      background: #15101a;
      border: 3px solid #2b2330;
      border-radius: 6px;
      image-rendering: pixelated;
      max-width: 96vw; max-height: 82vh;
    }
    /* Fullscreen: scale the canvas to fill the screen, preserving aspect. */
    #game:fullscreen {
      max-width: none; max-height: none;
      width: 100vw; height: 100vh;
      object-fit: contain;
      border: none; border-radius: 0;
      background: #0d0a12;
    }
    .bar { margin-top: 8px; display: flex; gap: 12px; align-items: center; }
    .hint { font-size: 12px; color: #6f6480; }
    .hint a { color: #9a86b8; }
    #fsBtn, #cheatBtn {
      background: #2b2330; color: #e0d6ea; border: 1px solid #3a3145;
      padding: 6px 12px; border-radius: 5px; cursor: pointer; font-family: monospace; font-size: 12px;
    }
    #fsBtn:hover, #cheatBtn:hover { border-color: #9a86b8; }
    #cheatPanel {
      display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 280px;
      background: rgba(18,13,24,0.96); border-left: 2px solid #3a3145;
      padding: 12px 14px; overflow-y: auto; z-index: 50;
      font-family: monospace; font-size: 12px; color: #e0d6ea;
    }
    #cheatPanel.open { display: block; }
    #cheatPanel h3 { margin: 14px 0 6px; font-size: 12px; color: #9a86b8; letter-spacing: 1px; }
    #cheatPanel h3:first-child { margin-top: 0; }
    #cheatPanel .grid { display: flex; flex-wrap: wrap; gap: 5px; }
    #cheatPanel button {
      background: #2b2330; color: #e0d6ea; border: 1px solid #3a3145;
      padding: 5px 8px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 11px;
    }
    #cheatPanel button:hover { border-color: #9a86b8; background: #352c41; }
    #cheatPanel .close { float: right; }
    #cheatPanel .note { color: #6f6480; margin: 4px 0 0; }
  </style>
</head>
<body>
  <h1>I S A A C L I K E</h1>
  <canvas id="game" width="900" height="620"></canvas>
  <div class="bar">
    <button id="fsBtn">⛶ Fullscreen</button>
    <button id="cheatBtn">🐞 Cheats</button>
    <p class="hint">WASD move • Arrows shoot • E bomb • M mute • R new run • SPACE descend &nbsp;|&nbsp;
      <a href="../designer/index.html">designer</a></p>
  </div>
  <div id="cheatPanel"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
